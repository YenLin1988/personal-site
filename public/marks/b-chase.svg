<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="追逐">
  <title>追逐</title>
  <circle cx="32" cy="32" r="30" fill="#884c42" />
  <!-- 烏龜（前方靜止的點） -->
  <circle cx="48" cy="32" r="3.5" fill="#f9f6f0" />
  <!-- 阿基里斯的軌跡（箭頭趨近但未抵達） -->
  <line x1="12" y1="32" x2="38" y2="32" stroke="#f9f6f0" stroke-width="2.5" stroke-linecap="round" />
